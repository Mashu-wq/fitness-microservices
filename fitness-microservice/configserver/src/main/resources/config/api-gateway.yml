server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: fitness-app-gateway
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: Keycloak
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: http://host.docker.internal:7080/realms/master
            authorization-uri: http://host.docker.internal:7080/realms/master/protocol/openid-connect/auth
            token-uri: http://host.docker.internal:7080/realms/master/protocol/openid-connect/token
            user-info-uri: http://host.docker.internal:7080/realms/master/protocol/openid-connect/userinfo
            jwk-set-uri: http://host.docker.internal:7080/realms/master/protocol/openid-connect/certs
            user-name-attribute: preferred_username
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
        - id: activity-service
          uri: lb://ACTIVITY-SERVICE
          predicates:
            - Path=/api/activities/**
        - id: ai-service
          uri: lb://AI-SERVICE
          predicates:
            - Path=/api/recommendations/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka
