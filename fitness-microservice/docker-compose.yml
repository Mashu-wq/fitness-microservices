version: '3.8'

services:
  eureka:
    build: ./eureka
    ports:
      - "8761:8761"
    networks:
      - fitness-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 10s
      retries: 5

  configserver:
    build: ./configserver
    ports:
      - "8888:8888"
    depends_on:
      - eureka
    environment:
      - SPRING_PROFILES_ACTIVE=default
    networks:
      - fitness-net

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka
      - configserver
    environment:
      - SPRING_PROFILES_ACTIVE=default
    networks:
      - fitness-net

  userservice:
    build: ./userservice
    ports:
      - "8081:8081"
    depends_on:
      - eureka
      - configserver
      - rabbitmq
    environment:
      - SPRING_PROFILES_ACTIVE=default
    networks:
      - fitness-net

  activityservice:
    build: ./activityservice
    ports:
      - "8082:8082"
    depends_on:
      - eureka
      - configserver
      - rabbitmq
    environment:
      - SPRING_PROFILES_ACTIVE=default
    networks:
      - fitness-net

  aiservice:
    build: ./aiservice
    ports:
      - "8083:8083"
    depends_on:
      - eureka
      - configserver
      - rabbitmq
    environment:
      - SPRING_PROFILES_ACTIVE=default
    networks:
      - fitness-net

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # RabbitMQ Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - fitness-net

networks:
  fitness-net:
    driver: bridge
